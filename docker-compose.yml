services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - tasktracker-data:/app/data
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  tasktracker-data:
